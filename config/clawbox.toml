# clawbox configuration
# See crates/clawbox-server/src/config.rs for all fields and defaults.

[server]
# Bind address for the HTTP server
host = "127.0.0.1"
# Port to listen on
port = 9800
# Bearer token for API authentication (auto-generated by `clawbox init`)
# auth_token = "<generated-on-init>"
# Maximum concurrent WASM executions
# max_concurrent_executions = 10

[sandbox]
# Directory containing .wasm tool files
tool_dir = "./tools/wasm"
# Default fuel limit for WASM execution (higher = longer allowed runtime)
default_fuel = 100000000
# Default timeout for WASM tool execution in milliseconds
default_timeout_ms = 30000
# Watch tool_dir for changes and hot-reload WASM modules
watch_tools = true

[proxy]
# Maximum response body size from proxied requests (bytes)
max_response_bytes = 1048576
# Default timeout for proxied HTTP requests in milliseconds
default_timeout_ms = 30000

[credentials]
# Path to the encrypted credential store
store_path = "~/.clawbox/credentials.enc"

[logging]
# Log output format: "json" or "text"
format = "json"
# Log level: "trace", "debug", "info", "warn", "error"
level = "info"
# Directory for audit log files
audit_dir = "./audit"

[containers]
# Maximum number of concurrent containers
max_containers = 10
# Root directory for per-agent workspace mounts
workspace_root = "~/.clawbox/workspaces"

[container_policy]
# Server-side network allowlist applied to all containers (overrides client requests)
network_allowlist = []
# Credential names that containers are allowed to request
allowed_credentials = []
# Which sandbox policies are permitted (default: wasm_only and container)
# allowed_policies = ["wasm_only", "container"]

# --- Image Templates ---
# Pre-configured container environments. Spawn with: clawbox spawn <name>

[images.templates.code-runner]
image = "clawbox/agent-base:latest"
description = "Python + Node.js environment for running code snippets"
network_allowlist = []
credentials = []

[images.templates.researcher]
image = "clawbox/agent-base:latest"
description = "Research container with web search and GitHub access"
network_allowlist = ["api.search.brave.com", "api.github.com"]
credentials = ["brave_search", "github_token"]
